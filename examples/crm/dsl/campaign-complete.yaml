boundary: CampaignComplete
contract_path: /campaigns/{id}/complete
fallback_override: false

event_catalog:
  - type: CampaignCompleted
    payload_template:
      completedAt: "$now()"

behaviors:
  - name: completeCampaign
    match:
      operationId: completeCampaign
      condition: "state.status == 'ACTIVE' || state.status == 'PAUSED'"
    emit: CampaignCompleted

reducers:
  - on: CampaignCompleted
    patches:
      - op: replace
        path: /status
        value: "${'COMPLETED'}"

initialization: []
