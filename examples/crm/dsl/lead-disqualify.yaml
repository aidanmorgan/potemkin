boundary: LeadDisqualify
contract_path: /leads/{id}/disqualify
fallback_override: false
audit_fields: true

event_catalog:
  - type: LeadDisqualified
    payload_template:
      reason: "command.payload?.reason != null ? command.payload.reason : 'Not qualified'"

behaviors:
  # HATEOAS: surfaced as the `disqualify` action link while CONTACTED or QUALIFIED.
  - name: disqualifyLead
    link_name: disqualify
    link_condition: "state.status == 'CONTACTED' || state.status == 'QUALIFIED'"
    match:
      operationId: disqualifyLead
      method: POST
      condition: "state.status == 'CONTACTED' || state.status == 'QUALIFIED'"
    emit: LeadDisqualified

reducers:
  - on: LeadDisqualified
    patches:
      - op: replace
        path: /status
        value: "${'DISQUALIFIED'}"

initialization: []
