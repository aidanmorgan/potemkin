openapi: "3.0.3"
info:
  title: Stripe API (Potemkin stateful simulation — core payments)
  version: "2024-06-20"
  description: |
    A curated, behaviourally-equivalent slice of the Stripe API implemented
    statefully by Potemkin. Object shapes, ids (cus_/prod_/price_/pi_/ch_/re_),
    the `object`/`created`/`livemode` envelope, and the PaymentIntent state
    machine follow the real Stripe API. Requests are form-encoded and responses
    are JSON, exactly as Stripe.

    Derived from the official Stripe OpenAPI specification
    (https://github.com/stripe/openapi) — trimmed to the core payments resources.

servers:
  - url: https://api.stripe.com

paths:
  # ── Customers ───────────────────────────────────────────────────────────────
  /v1/customers:
    post:
      operationId: createCustomer
      summary: Create a customer
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email: { type: string }
                name: { type: string }
                description: { type: string }
                phone: { type: string }
                balance: { type: integer }
                metadata: { type: object, additionalProperties: { type: string } }
      responses:
        "200":
          description: The created customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/customer" }
    get:
      operationId: listCustomers
      summary: List customers
      parameters:
        - { name: email, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200":
          description: A list of customers (Stripe list envelope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/customer_list" }
  /v1/customers/{customer}:
    get:
      operationId: getCustomer
      summary: Retrieve a customer
      parameters:
        - { name: customer, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/customer" }
        "404":
          description: No such customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/error" }
    post:
      operationId: updateCustomer
      summary: Update a customer
      parameters:
        - { name: customer, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                email: { type: string }
                name: { type: string }
                description: { type: string }
                phone: { type: string }
                balance: { type: integer }
                metadata: { type: object, additionalProperties: { type: string } }
      responses:
        "200":
          description: The updated customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/customer" }
    delete:
      operationId: deleteCustomer
      summary: Delete a customer
      parameters:
        - { name: customer, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The deleted customer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/deleted_customer" }

  # ── Products ────────────────────────────────────────────────────────────────
  /v1/products:
    post:
      operationId: createProduct
      summary: Create a product
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                active: { type: boolean }
                metadata: { type: object, additionalProperties: { type: string } }
              required: [name]
      responses:
        "200":
          description: The created product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/product" }
    get:
      operationId: listProducts
      summary: List products
      parameters:
        - { name: active, in: query, required: false, schema: { type: boolean } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200":
          description: A list of products (Stripe list envelope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/product_list" }
  /v1/products/{id}:
    get:
      operationId: getProduct
      summary: Retrieve a product
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/product" }
        "404":
          description: No such product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/error" }
    post:
      operationId: updateProduct
      summary: Update a product
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name: { type: string }
                description: { type: string }
                active: { type: boolean }
                metadata: { type: object, additionalProperties: { type: string } }
      responses:
        "200":
          description: The updated product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/product" }
    delete:
      operationId: deleteProduct
      summary: Delete a product
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The deleted product
          content:
            application/json:
              schema: { $ref: "#/components/schemas/deleted_product" }

  # ── Prices ──────────────────────────────────────────────────────────────────
  # Stripe prices are immutable except active/nickname/metadata, and cannot be
  # deleted (only deactivated) — so there is deliberately no DELETE operation.
  /v1/prices:
    post:
      operationId: createPrice
      summary: Create a price
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                product: { type: string }
                unit_amount: { type: integer }
                currency: { type: string }
                nickname: { type: string }
                active: { type: boolean }
                metadata: { type: object, additionalProperties: { type: string } }
              required: [product, currency]
      responses:
        "200":
          description: The created price
          content:
            application/json:
              schema: { $ref: "#/components/schemas/price" }
    get:
      operationId: listPrices
      summary: List prices
      parameters:
        - { name: product, in: query, required: false, schema: { type: string } }
        - { name: active, in: query, required: false, schema: { type: boolean } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200":
          description: A list of prices (Stripe list envelope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/price_list" }
  /v1/prices/{id}:
    get:
      operationId: getPrice
      summary: Retrieve a price
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The price
          content:
            application/json:
              schema: { $ref: "#/components/schemas/price" }
        "404":
          description: No such price
          content:
            application/json:
              schema: { $ref: "#/components/schemas/error" }
    post:
      operationId: updatePrice
      summary: Update a price (active/nickname/metadata only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                active: { type: boolean }
                nickname: { type: string }
                metadata: { type: object, additionalProperties: { type: string } }
      responses:
        "200":
          description: The updated price
          content:
            application/json:
              schema: { $ref: "#/components/schemas/price" }

  # ── PaymentIntents ──────────────────────────────────────────────────────────
  # A PaymentIntent is a state machine: created in requires_payment_method /
  # requires_confirmation, advanced by confirm (→ succeeded, or → requires_capture
  # when capture_method=manual), captured (→ succeeded), or canceled (→ canceled).
  /v1/payment_intents:
    post:
      operationId: createPaymentIntent
      summary: Create a payment intent
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                amount: { type: integer }
                currency: { type: string }
                customer: { type: string }
                payment_method: { type: string }
                capture_method: { type: string, enum: [automatic, manual] }
                description: { type: string }
                metadata: { type: object, additionalProperties: { type: string } }
              required: [amount, currency]
      responses:
        "200":
          description: The created payment intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/payment_intent" }
    get:
      operationId: listPaymentIntents
      summary: List payment intents
      parameters:
        - { name: customer, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200":
          description: A list of payment intents (Stripe list envelope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/payment_intent_list" }
  /v1/payment_intents/{id}:
    get:
      operationId: getPaymentIntent
      summary: Retrieve a payment intent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The payment intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/payment_intent" }
        "404":
          description: No such payment intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/error" }
    post:
      operationId: updatePaymentIntent
      summary: Update a payment intent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                amount: { type: integer }
                description: { type: string }
                metadata: { type: object, additionalProperties: { type: string } }
      responses:
        "200":
          description: The updated payment intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/payment_intent" }
  /v1/payment_intents/{id}/confirm:
    post:
      operationId: confirmPaymentIntent
      summary: Confirm a payment intent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                payment_method: { type: string }
      responses:
        "200":
          description: The confirmed payment intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/payment_intent" }
        "402":
          description: The card was declined
          content:
            application/json:
              schema: { $ref: "#/components/schemas/error" }
  /v1/payment_intents/{id}/capture:
    post:
      operationId: capturePaymentIntent
      summary: Capture an authorized payment intent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The captured payment intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/payment_intent" }
  /v1/payment_intents/{id}/cancel:
    post:
      operationId: cancelPaymentIntent
      summary: Cancel a payment intent
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                cancellation_reason: { type: string }
      responses:
        "200":
          description: The canceled payment intent
          content:
            application/json:
              schema: { $ref: "#/components/schemas/payment_intent" }

  # ── Charges ─────────────────────────────────────────────────────────────────
  # Charges are not created directly via the API — they materialise as a side
  # effect of confirming a PaymentIntent (an in-UoW reaction). Only list/retrieve
  # are exposed, exactly as the modern Stripe API.
  /v1/charges:
    get:
      operationId: listCharges
      summary: List charges
      parameters:
        - { name: payment_intent, in: query, required: false, schema: { type: string } }
        - { name: customer, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200":
          description: A list of charges (Stripe list envelope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/charge_list" }
  /v1/charges/{id}:
    get:
      operationId: getCharge
      summary: Retrieve a charge
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The charge
          content:
            application/json:
              schema: { $ref: "#/components/schemas/charge" }
        "404":
          description: No such charge
          content:
            application/json:
              schema: { $ref: "#/components/schemas/error" }

  # ── Refunds ─────────────────────────────────────────────────────────────────
  # Creating a refund updates the target charge's amount_refunded/refunded via an
  # in-UoW reaction. (In this simulation `amount` is explicit — a refund cannot
  # read the charge's remaining balance across aggregates to default a full refund.)
  /v1/refunds:
    post:
      operationId: createRefund
      summary: Create a refund
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                charge: { type: string }
                amount: { type: integer }
                currency: { type: string }
                reason: { type: string, enum: [duplicate, fraudulent, requested_by_customer] }
                metadata: { type: object, additionalProperties: { type: string } }
              required: [charge, amount]
      responses:
        "200":
          description: The created refund
          content:
            application/json:
              schema: { $ref: "#/components/schemas/refund" }
    get:
      operationId: listRefunds
      summary: List refunds
      parameters:
        - { name: charge, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 100 } }
      responses:
        "200":
          description: A list of refunds (Stripe list envelope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/refund_list" }
  /v1/refunds/{id}:
    get:
      operationId: getRefund
      summary: Retrieve a refund
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: The refund
          content:
            application/json:
              schema: { $ref: "#/components/schemas/refund" }
        "404":
          description: No such refund
          content:
            application/json:
              schema: { $ref: "#/components/schemas/error" }
    post:
      operationId: updateRefund
      summary: Update a refund (metadata only)
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                metadata: { type: object, additionalProperties: { type: string } }
      responses:
        "200":
          description: The updated refund
          content:
            application/json:
              schema: { $ref: "#/components/schemas/refund" }

  # ── Payouts (declared but NOT simulated) ────────────────────────────────────
  # A real Stripe endpoint we deliberately do not implement statefully — it
  # exercises the 501 Not Implemented behaviour for un-bounded contract paths.
  /v1/payouts:
    get:
      operationId: listPayouts
      summary: List payouts (not implemented by this simulation)
      responses:
        "200":
          description: A list of payouts
          content:
            application/json:
              schema: { type: object }

components:
  schemas:
    # ── Shared ────────────────────────────────────────────────────────────────
    error:
      type: object
      additionalProperties: true
      properties:
        error:
          type: object
          additionalProperties: true
          properties:
            type: { type: string }
            code: { type: string }
            message: { type: string }
            param: { type: string }
      required: [error]

    metadata:
      type: object
      additionalProperties: { type: string }

    # ── Customer ──────────────────────────────────────────────────────────────
    customer:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        object: { type: string, enum: [customer] }
        created: { type: integer }
        livemode: { type: boolean }
        email: { type: string, nullable: true }
        name: { type: string, nullable: true }
        description: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        balance: { type: integer }
        currency: { type: string, nullable: true }
        delinquent: { type: boolean, nullable: true }
        metadata: { $ref: "#/components/schemas/metadata" }
      required: [id, object, created, livemode]

    deleted_customer:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        object: { type: string, enum: [customer] }
        deleted: { type: boolean, enum: [true] }
      required: [id, object, deleted]

    customer_list:
      type: object
      additionalProperties: false
      properties:
        object: { type: string, enum: [list] }
        url: { type: string }
        has_more: { type: boolean }
        data:
          type: array
          items: { $ref: "#/components/schemas/customer" }
      required: [object, data, has_more, url]

    # ── Product ───────────────────────────────────────────────────────────────
    product:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        object: { type: string, enum: [product] }
        created: { type: integer }
        livemode: { type: boolean }
        name: { type: string }
        description: { type: string, nullable: true }
        active: { type: boolean }
        default_price: { type: string, nullable: true }
        metadata: { $ref: "#/components/schemas/metadata" }
      required: [id, object, created, livemode, name, active]

    deleted_product:
      type: object
      additionalProperties: false
      properties:
        id: { type: string }
        object: { type: string, enum: [product] }
        deleted: { type: boolean, enum: [true] }
      required: [id, object, deleted]

    product_list:
      type: object
      additionalProperties: false
      properties:
        object: { type: string, enum: [list] }
        url: { type: string }
        has_more: { type: boolean }
        data:
          type: array
          items: { $ref: "#/components/schemas/product" }
      required: [object, data, has_more, url]

    # ── Price ─────────────────────────────────────────────────────────────────
    price:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        object: { type: string, enum: [price] }
        created: { type: integer }
        livemode: { type: boolean }
        product: { type: string }
        unit_amount: { type: integer, nullable: true }
        currency: { type: string }
        type: { type: string, enum: [one_time, recurring] }
        active: { type: boolean }
        nickname: { type: string, nullable: true }
        metadata: { $ref: "#/components/schemas/metadata" }
      required: [id, object, created, livemode, product, currency, active, type]

    price_list:
      type: object
      additionalProperties: false
      properties:
        object: { type: string, enum: [list] }
        url: { type: string }
        has_more: { type: boolean }
        data:
          type: array
          items: { $ref: "#/components/schemas/price" }
      required: [object, data, has_more, url]

    # ── PaymentIntent ───────────────────────────────────────────────────────────
    payment_intent:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        object: { type: string, enum: [payment_intent] }
        created: { type: integer }
        livemode: { type: boolean }
        amount: { type: integer }
        currency: { type: string }
        status:
          type: string
          enum: [requires_payment_method, requires_confirmation, requires_action, requires_capture, processing, succeeded, canceled]
        customer: { type: string, nullable: true }
        payment_method: { type: string, nullable: true }
        capture_method: { type: string, enum: [automatic, manual] }
        amount_received: { type: integer }
        latest_charge: { type: string, nullable: true }
        cancellation_reason: { type: string, nullable: true }
        description: { type: string, nullable: true }
        client_secret: { type: string }
        metadata: { $ref: "#/components/schemas/metadata" }
      required: [id, object, created, livemode, amount, currency, status, capture_method, amount_received]

    payment_intent_list:
      type: object
      additionalProperties: false
      properties:
        object: { type: string, enum: [list] }
        url: { type: string }
        has_more: { type: boolean }
        data:
          type: array
          items: { $ref: "#/components/schemas/payment_intent" }
      required: [object, data, has_more, url]

    # ── Charge ──────────────────────────────────────────────────────────────────
    charge:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        object: { type: string, enum: [charge] }
        created: { type: integer }
        livemode: { type: boolean }
        amount: { type: integer }
        currency: { type: string }
        paid: { type: boolean }
        captured: { type: boolean }
        status: { type: string, enum: [succeeded, pending, failed] }
        payment_intent: { type: string, nullable: true }
        payment_method: { type: string, nullable: true }
        customer: { type: string, nullable: true }
        amount_captured: { type: integer }
        amount_refunded: { type: integer }
        refunded: { type: boolean }
      required: [id, object, created, livemode, amount, currency, paid, captured, status, amount_captured, amount_refunded, refunded]

    charge_list:
      type: object
      additionalProperties: false
      properties:
        object: { type: string, enum: [list] }
        url: { type: string }
        has_more: { type: boolean }
        data:
          type: array
          items: { $ref: "#/components/schemas/charge" }
      required: [object, data, has_more, url]

    # ── Refund ──────────────────────────────────────────────────────────────────
    refund:
      type: object
      additionalProperties: true
      properties:
        id: { type: string }
        object: { type: string, enum: [refund] }
        created: { type: integer }
        livemode: { type: boolean }
        amount: { type: integer }
        currency: { type: string }
        charge: { type: string }
        payment_intent: { type: string, nullable: true }
        status: { type: string, enum: [succeeded, pending, failed, canceled] }
        reason: { type: string, nullable: true }
        metadata: { $ref: "#/components/schemas/metadata" }
      required: [id, object, created, livemode, amount, currency, charge, status]

    refund_list:
      type: object
      additionalProperties: false
      properties:
        object: { type: string, enum: [list] }
        url: { type: string }
        has_more: { type: boolean }
        data:
          type: array
          items: { $ref: "#/components/schemas/refund" }
      required: [object, data, has_more, url]

    # Per-boundary state schemas. The engine derives each boundary's state shape
    # from components.schemas.<BoundaryName>; both Customer boundaries (the
    # collection and the {customer} by-id boundary) share the customer shape.
    Customer:
      $ref: "#/components/schemas/customer"
    CustomerById:
      $ref: "#/components/schemas/customer"
    Product:
      $ref: "#/components/schemas/product"
    ProductById:
      $ref: "#/components/schemas/product"
    Price:
      $ref: "#/components/schemas/price"
    PriceById:
      $ref: "#/components/schemas/price"
    PaymentIntent:
      $ref: "#/components/schemas/payment_intent"
    PaymentIntentById:
      $ref: "#/components/schemas/payment_intent"
    PaymentIntentConfirm:
      $ref: "#/components/schemas/payment_intent"
    PaymentIntentCapture:
      $ref: "#/components/schemas/payment_intent"
    PaymentIntentCancel:
      $ref: "#/components/schemas/payment_intent"
    Charge:
      $ref: "#/components/schemas/charge"
    ChargeById:
      $ref: "#/components/schemas/charge"
    Refund:
      $ref: "#/components/schemas/refund"
    RefundById:
      $ref: "#/components/schemas/refund"
