# Refund — by-id boundary (GET retrieve, POST update metadata).
boundary: RefundById
contract_path: /v1/refunds/{id}
fallback_override: true

response: "ts:refundResponse"

identity:
  key:
    from: path
    name: id

event_catalog:
  - type: RefundUpdated
    payload_template:
      metadata: "has(command.payload.metadata) ? command.payload.metadata : state.metadata"

behaviors:
  - name: updateRefund
    match:
      operationId: updateRefund
      condition: "true"
    emit: RefundUpdated

reducers:
  - on: RefundUpdated
    patches:
      - { op: replace, path: /metadata, value: "${event.payload.metadata}" }
