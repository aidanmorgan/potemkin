# Refund — collection boundary (POST create, GET list).
# Stripe ids are `re_<token>`. Creating a refund triggers an in-UoW reaction
# that updates the target charge's amount_refunded/refunded (see charge.yaml).
boundary: Refund
contract_path: /v1/refunds
fallback_override: true

response: "ts:refundResponse"

identity:
  creation:
    generate: "ts:refundId"

query_mapping:
  charge: "state.charge == param"

event_catalog:
  - type: RefundCreated
    payload_template:
      id: "command.targetId"
      object: "'refund'"
      created: "ts:unixNow"
      livemode: "false"
      amount: "has(command.payload.amount) ? command.payload.amount : 0"
      currency: "has(command.payload.currency) ? command.payload.currency : 'usd'"
      charge: "command.payload.charge"
      payment_intent: "null"
      status: "'succeeded'"
      reason: "has(command.payload.reason) ? command.payload.reason : null"
      metadata: "has(command.payload.metadata) ? command.payload.metadata : {}"

behaviors:
  - name: createRefund
    match:
      operationId: createRefund
      condition: "true"
    emit: RefundCreated

reducers:
  - on: RefundCreated
    patches:
      - { op: replace, path: /id, value: "${event.payload.id}" }
      - { op: replace, path: /object, value: "${event.payload.object}" }
      - { op: replace, path: /created, value: "${event.payload.created}" }
      - { op: replace, path: /livemode, value: "${event.payload.livemode}" }
      - { op: replace, path: /amount, value: "${event.payload.amount}" }
      - { op: replace, path: /currency, value: "${event.payload.currency}" }
      - { op: replace, path: /charge, value: "${event.payload.charge}" }
      - { op: replace, path: /payment_intent, value: "${event.payload.payment_intent}" }
      - { op: replace, path: /status, value: "${event.payload.status}" }
      - { op: replace, path: /reason, value: "${event.payload.reason}" }
      - { op: replace, path: /metadata, value: "${event.payload.metadata}" }
