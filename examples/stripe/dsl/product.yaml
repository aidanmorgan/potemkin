# Product — collection boundary (POST create, GET list).
# Stripe ids are `prod_<token>`; every object carries object/created/livemode.
boundary: Product
contract_path: /v1/products
# fallback_override lets the collection GET (/v1/products) auto-serve a query.
fallback_override: true

# Stripe-faithful response shaping (200-on-create, list envelope) via the
# generic response extension point — no framework changes.
response: "ts:productResponse"

identity:
  creation:
    # Custom Stripe-shaped id (prod_…) injected via a registered @Script extension.
    generate: "ts:productId"

query_mapping:
  active: "state.active == param"

event_catalog:
  - type: ProductCreated
    payload_template:
      id: "command.targetId"
      object: "'product'"
      created: "ts:unixNow"
      livemode: "false"
      name: "command.payload.name"
      description: "has(command.payload.description) ? command.payload.description : null"
      active: "has(command.payload.active) ? command.payload.active : true"
      default_price: "null"
      metadata: "has(command.payload.metadata) ? command.payload.metadata : {}"

behaviors:
  - name: createProduct
    match:
      operationId: createProduct
      condition: "true"
    emit: ProductCreated

reducers:
  - on: ProductCreated
    patches:
      - { op: replace, path: /id, value: "${event.payload.id}" }
      - { op: replace, path: /object, value: "${event.payload.object}" }
      - { op: replace, path: /created, value: "${event.payload.created}" }
      - { op: replace, path: /livemode, value: "${event.payload.livemode}" }
      - { op: replace, path: /name, value: "${event.payload.name}" }
      - { op: replace, path: /description, value: "${event.payload.description}" }
      - { op: replace, path: /active, value: "${event.payload.active}" }
      - { op: replace, path: /default_price, value: "${event.payload.default_price}" }
      - { op: replace, path: /metadata, value: "${event.payload.metadata}" }
