# specmatic.yaml — example configuration for the Potemkin engine
#
# Supported top-level keys:
#   stubs   : list of directory paths (relative to this file) to scan for *.json stub files
#   mocks   : alias for stubs (both are merged)
#   contracts : list of OpenAPI spec paths (informational; Potemkin loads its own spec via DSL)
#   sources   : new Specmatic v2 sources[] format (specifications[] entries extracted as contracts)
#
# Pass this file to bootSystem via:
#   bootSystem({ ...fixture, specmaticConfig: { configPath: './specmatic.yaml' } })

stubs:
  - banking_examples
  - shared_stubs/error-scenarios

mocks:
  - shared_stubs/edge-cases

contracts:
  - api/banking.yaml
