boundary: Opportunity
contract_path: /opportunities
fallback_override: false
identity:
  creation:
    generate: "$uuidv7()"
event_catalog:
  - type: OpportunityCreated
    payload_template:
      id: "command.targetId"
      leadId: "command.payload.leadId"
      value: "command.payload.value"
      stage: "'proposed'"
      createdAt: "$now()"
  - type: OpportunityProgressed
    payload_template:
      progressedAt: "$now()"
      stage: "command.payload.stage"
  - type: OpportunityWon
    payload_template:
      wonAt: "$now()"
  - type: OpportunityLost
    payload_template:
      reason: "command.payload.reason"
      lostAt: "$now()"
behaviors:
  - name: createOpportunity
    match:
      operationId: createOpportunity
      condition: "command.payload.leadId != null && command.payload.value > 0"
    emit: OpportunityCreated
    dispatch_commands:
      - boundary: Lead
        intent: mutation
        operationId: patchLead
        target_id: "command.payload.leadId"
        payload:
          opportunityId: "command.targetId"
        condition: "command.payload.leadId != null"
  - name: progressStage
    match:
      operationId: progressOpportunity
      condition: >-
        command.path == $concat('/opportunities/', command.targetId, '/progress')
        && command.payload.stage != null
        && state.stage != 'won'
        && state.stage != 'lost'
    emit: OpportunityProgressed
  - name: closeWon
    match:
      operationId: closeOpportunityWon
      condition: >-
        command.path == $concat('/opportunities/', command.targetId, '/close-won')
        && state.stage != 'won'
        && state.stage != 'lost'
    emit_when:
      - when: "state.stage != 'won'"
        emit: OpportunityWon
  - name: closeLost
    match:
      operationId: closeOpportunityLost
      condition: >-
        command.path == $concat('/opportunities/', command.targetId, '/close-lost')
        && state.stage != 'won'
        && state.stage != 'lost'
    emit: OpportunityLost
reducers:
  - on: OpportunityCreated
    patches:
      - op: replace
        path: /id
        value: "${event.payload.id}"
      - op: replace
        path: /leadId
        value: "${event.payload.leadId}"
      - op: replace
        path: /value
        value: "${event.payload.value}"
      - op: replace
        path: /stage
        value: "${event.payload.stage}"
      - op: replace
        path: /createdAt
        value: "${event.payload.createdAt}"
  - on: OpportunityProgressed
    patches:
      - op: replace
        path: /stage
        value: "${event.payload.stage}"
  - on: OpportunityWon
    patches:
      - op: replace
        path: /stage
        value: "${'won'}"
  - on: OpportunityLost
    patches:
      - op: replace
        path: /stage
        value: "${'lost'}"
      - op: replace
        path: /lostReason
        value: "${event.payload.reason}"
initialization: []
