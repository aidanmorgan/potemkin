boundary: LeadScoring
contract_path: /lead-scores
fallback_override: false
identity:
  creation:
    generate: "$uuidv7()"

# Scripts are NOT declared inline here. Author a @Script-annotated TypeScript class
# in a scanned .ts file (see typescript.scan in potemkin.yaml) and reference it with
# ts:<id> in any CEL-accepting field below.
#
# Example scanned script (scripts/computeScore.ts):
#
#   import { Script, type ScriptContext } from '@potemkin/sdk';
#
#   @Script('computeScore')
#   export class ComputeScore {
#     run(ctx: ScriptContext): number {
#       const source = ctx.command.payload['source'] as string ?? 'COLD_LIST';
#       const base: Record<string, number> = { REFERRAL: 80, PARTNER: 70, WEBSITE: 50, COLD_LIST: 20 };
#       const multiplier = (ctx.command.payload['scoreMultiplier'] as number) ?? 1.0;
#       return Math.round((base[source] ?? 30) * multiplier);
#     }
#   }
#
# See docs/dsl.md Section 10 and tests/fixtures/ts-script/ for the canonical fixture.

event_catalog:
  - type: LeadScoreCreated
    payload_template:
      id: "command.targetId"
      leadId: "command.payload.leadId"
      score: "ts:computeScore"
      createdAt: "$now()"
  - type: LeadScoreUpdated
    payload_template:
      score: "ts:computeScore"
      updatedAt: "$now()"

behaviors:
  - name: createScore
    match:
      operationId: createLeadScore
      condition: "command.payload.leadId != null"
    emit: LeadScoreCreated
  - name: updateScore
    match:
      operationId: updateLeadScore
      condition: "command.payload.scoreMultiplier != null"
    emit: LeadScoreUpdated

reducers:
  - on: LeadScoreCreated
    patches:
      - op: replace
        path: /id
        value: "${event.payload.id}"
      - op: replace
        path: /leadId
        value: "${event.payload.leadId}"
      - op: replace
        path: /score
        value: "${event.payload.score}"
      - op: replace
        path: /createdAt
        value: "${event.payload.createdAt}"
  - on: LeadScoreUpdated
    patches:
      - op: replace
        path: /score
        value: "${event.payload.score}"

initialization: []
