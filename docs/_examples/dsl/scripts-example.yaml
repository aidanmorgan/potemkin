boundary: LeadScoring
contract_path: /lead-scores
fallback_override: false
identity:
  creation:
    generate: "$uuidv7()"
scripts:
  - name: computeScore
    code: |
      export default function(ctx) {
        const source = ctx.command.payload.source ?? 'COLD_LIST';
        const baseScore = { REFERRAL: 80, PARTNER: 70, WEBSITE: 50, COLD_LIST: 20 };
        const multiplier = ctx.command.payload.scoreMultiplier ?? 1.0;
        return Math.round((baseScore[source] ?? 30) * multiplier);
      }
  - name: buildAuditTrail
    code: |
      export default function(ctx) {
        return {
          actor: ctx.command.actor?.id ?? 'system',
          action: ctx.command.intent,
          at: ctx.helpers.now(),
          requestId: ctx.command.commandId,
        };
      }
event_catalog:
  - type: LeadScoreCreated
    payload_template:
      id: "command.targetId"
      leadId: "command.payload.leadId"
      score: "ts:computeScore"
      createdAt: "$now()"
  - type: LeadScoreUpdated
    payload_template:
      score: "ts:computeScore"
      audit: "ts:buildAuditTrail"
      updatedAt: "$now()"
behaviors:
  - name: createScore
    match:
      operationId: createLeadScore
      condition: "command.payload.leadId != null"
    emit: LeadScoreCreated
  - name: updateScore
    match:
      operationId: updateLeadScore
      condition: "command.payload.scoreMultiplier != null"
    emit: LeadScoreUpdated
reducers:
  - on: LeadScoreCreated
    patches:
      - op: replace
        path: /id
        value: "${event.payload.id}"
      - op: replace
        path: /leadId
        value: "${event.payload.leadId}"
      - op: replace
        path: /score
        value: "${event.payload.score}"
      - op: replace
        path: /createdAt
        value: "${event.payload.createdAt}"
  - on: LeadScoreUpdated
    patches:
      - op: replace
        path: /score
        value: "${event.payload.score}"
initialization: []
