idempotency:
  enabled: true
  ttl_seconds: 86400
  hash_includes_body: true

sagas:
  - name: LeadConversion
    trigger:
      boundary: Lead
      intent: mutation
      condition: "$concat('/leads/', command.targetId, '/convert') == command.path"
    steps:
      - name: createOpportunity
        boundary: Opportunity
        intent: creation
        operationId: createOpportunity
        target_id: "$uuidv7()"
        payload:
          leadId: "command.targetId"
          value: "command.payload.value"
        compensation:
          intent: mutation
          operationId: closeOpportunity
          payload:
            stage: "'withdrawn'"
      - name: notifySalesTeam
        boundary: Notification
        intent: creation
        operationId: createNotification
        payload:
          subject: "'New opportunity created'"
          leadId: "command.targetId"
          value: "command.payload.value"

derived_projections:
  - name: LeadSummary
    key: "event.aggregateId"
    subscribe:
      - Lead:LeadCreated
      - Opportunity:OpportunityCreated
    reduce:
      - on: LeadCreated
        patches:
          - op: replace
            path: /lead_id
            value: "${event.aggregateId}"
          - op: replace
            path: /companyName
            value: "${event.payload.companyName}"
          - op: replace
            path: /total_opportunities
            value: "${0}"
      - on: OpportunityCreated
        patches:
          - op: replace
            path: /total_opportunities
            value: "${coalesce(state.total_opportunities, 0) + 1}"
