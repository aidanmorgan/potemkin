openapi: "3.0.3"
info:
  title: Banking Simulation API
  version: "1.0.0"
  description: Tiny banking domain for the Specmatic Stateful Simulation Engine fixtures.

paths:
  /customers:
    get:
      operationId: listCustomers
      summary: List all customers
      parameters:
        - name: riskBand
          in: query
          required: false
          schema:
            type: string
            enum: [LOW, MED, HIGH]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      summary: Create a new customer
      parameters:
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [name, riskBand]
              properties:
                name:
                  type: string
                  minLength: 1
                riskBand:
                  type: string
                  enum: [LOW, MED, HIGH]
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /customers/{id}:
    get:
      operationId: getCustomer
      summary: Get a customer by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Customer found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: patchCustomer
      summary: Partially update a customer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "412":
          description: Precondition failed (If-Match mismatch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /loans:
    get:
      operationId: listLoans
      summary: List all loan accounts
      parameters:
        - name: customerId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [DRAFT, ACTIVE, SETTLED]
      responses:
        "200":
          description: List of loan accounts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LoanAccount"
    post:
      operationId: createLoan
      summary: Open a new loan account
      parameters:
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [customerId, principal]
              properties:
                customerId:
                  type: string
                  format: uuid
                principal:
                  type: number
                  minimum: 0
      responses:
        "201":
          description: Loan account created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanAccount"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /loans/{id}:
    get:
      operationId: getLoan
      summary: Get a loan account by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Loan account found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanAccount"
        "404":
          description: Loan account not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /loans/{id}/disburse:
    post:
      operationId: disburseLoan
      summary: Disburse an amount from a loan account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0
      responses:
        "200":
          description: Loan after disbursement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanAccount"
        "404":
          description: Loan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Unprocessable — loan is settled or amount invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /loans/{id}/repay:
    post:
      operationId: repayLoan
      summary: Make a repayment on a loan account
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [amount]
              properties:
                amount:
                  type: number
                  minimum: 0
      responses:
        "200":
          description: Loan after repayment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoanAccount"
        "404":
          description: Loan not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Unprocessable — amount exceeds balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  schemas:
    Customer:
      type: object
      additionalProperties: false
      required: [id, name, riskBand, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          minLength: 1
        riskBand:
          type: string
          enum: [LOW, MED, HIGH]
        createdAt:
          type: string
          format: date-time
        loanIds:
          type: array
          items:
            type: string
            format: uuid
          default: []
        totalExposure:
          type: number
          x-derived: "state.loanIds == null ? 0 : 0"

    LoanAccount:
      type: object
      additionalProperties: false
      required: [id, customerId, principal, balance, status, openedAt]
      properties:
        id:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        principal:
          type: number
          minimum: 0
        balance:
          type: number
          minimum: 0
        status:
          type: string
          enum: [DRAFT, ACTIVE, SETTLED]
        openedAt:
          type: string
          format: date-time
        transactions:
          type: array
          default: []
          items:
            type: object
            additionalProperties: false
            required: [txId, kind, amount, at]
            properties:
              txId:
                type: string
                format: uuid
              kind:
                type: string
                enum: [DISBURSEMENT, REPAYMENT]
              amount:
                type: number
                minimum: 0
              at:
                type: string
                format: date-time

    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true
