openapi: 3.0.3
info:
  title: Widget API (TS-reducer fixture)
  version: "1.0.0"
paths:
  /widgets:
    post:
      operationId: createWidget
      summary: Create a widget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Widget created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
  /widgets/{id}:
    get:
      operationId: getWidget
      summary: Get a widget by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Widget found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: renameWidget
      summary: Rename a widget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Widget renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Widget"
components:
  schemas:
    Widget:
      type: object
      additionalProperties: false
      required: [id, name, status]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        renameCount:
          type: integer
    WidgetById:
      $ref: "#/components/schemas/Widget"
    WidgetRename:
      $ref: "#/components/schemas/Widget"
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
