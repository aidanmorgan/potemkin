openapi: 3.0.3
info:
  title: Latency Demo API
  version: "1.0.0"
paths:
  /jobs:
    post:
      operationId: submitJob
      summary: Submit a job (latency-configured boundary, fixed_ms=60)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: Job submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /jobs/{id}:
    get:
      operationId: getJob
      summary: Get a job by id (no latency configured)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Job found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Job:
      type: object
      additionalProperties: false
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
    JobById:
      $ref: "#/components/schemas/Job"
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
