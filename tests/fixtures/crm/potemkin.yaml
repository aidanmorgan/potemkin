version: 1
specmatic: ./specmatic.yaml
modules:
  - "dsl/**/*.yaml"
  # call-add-transcript and lead-add-note are WIP boundaries authored in an
  # older dialect with no OpenAPI contract path; they are excluded until
  # converted to the canonical snake_case form.
  - "!dsl/call-add-transcript.yaml"
  - "!dsl/lead-add-note.yaml"
typescript:
  scan:
    - include: ["scripts/**/*.ts"]
      exclude: ["**/*.test.ts", "**/*.d.ts"]
  watch: false
  watchDebounceMs: 200
plugin:
  engine:
    url: "${POTEMKIN_ENGINE_URL:http://localhost:3000}"
    timeoutMs: 30000
  controlPort: 0
