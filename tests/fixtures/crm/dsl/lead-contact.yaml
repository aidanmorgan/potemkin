boundary: LeadContact
contract_path: /leads/{id}/contact
fallback_override: false
audit_fields: true

event_catalog:
  - type: LeadContacted
    payload_template:
      lastContactedAt: "$now()"

behaviors:
  # REQ-61: match.requires with error_code/error_message
  # REQ-64: emit_when with 2+ alternatives
  # HATEOAS: surfaced as the `contact` action link, but only while the lead is
  # still NEW — once contacted the link disappears (link_condition is independent
  # of the runtime match condition, which still allows re-contact).
  - name: contactLead
    link_name: contact
    link_condition: "state.status == 'NEW'"
    match:
      operationId: contactLead
      method: POST
      condition: "true"
      requires:
        - name: not-dnc
          condition: "state.status != 'DNC'"
          error_code: LEAD_IS_DNC
          error_message: "Cannot contact a lead that has been marked Do Not Call"
        - name: not-converted
          condition: "state.status != 'CONVERTED'"
          error_code: LEAD_ALREADY_CONVERTED
          error_message: "Cannot contact a lead that has already been converted"
    emit_when:
      - when: "state.status == 'NEW' || state.status == 'CONTACTED'"
        emit: LeadContacted
      - when: "state.status == 'QUALIFIED'"
        emit: LeadContacted

reducers:
  - on: LeadContacted
    patches:
      - op: replace
        path: /status
        value: "${'CONTACTED'}"
      - op: replace
        path: /lastContactedAt
        value: "${event.payload.lastContactedAt}"

initialization: []
