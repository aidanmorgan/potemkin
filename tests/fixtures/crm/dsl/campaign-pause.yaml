boundary: CampaignPause
contract_path: /campaigns/{id}/pause
fallback_override: false

event_catalog:
  - type: CampaignPaused
    payload_template:
      pausedAt: "$now()"

behaviors:
  # REQ-64: emit_when with multiple branches
  - name: pauseCampaign
    match:
      operationId: pauseCampaign
      condition: "state.status == 'ACTIVE'"
    emit_when:
      - when: "state.actualCalls != null && state.actualCalls > 0"
        emit: CampaignPaused
      - when: "state.actualCalls == null || state.actualCalls == 0"
        emit: CampaignPaused

reducers:
  - on: CampaignPaused
    patches:
      - op: replace
        path: /status
        value: "'PAUSED'"

initialization: []
