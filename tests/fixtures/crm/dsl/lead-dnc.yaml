boundary: LeadDNC
contract_path: /leads/{id}/dnc
fallback_override: false
audit_fields: true

event_catalog:
  - type: LeadMarkedDNC
    payload_template:
      dncAt: "$now()"
      reason: "command.payload?.reason != null ? command.payload.reason : 'No reason given'"

behaviors:
  # REQ-84/85/86: RBAC required_scopes
  # HATEOAS: surfaced as the `dnc` action link in any state except DNC/CONVERTED.
  - name: markLeadDNC
    link_name: dnc
    link_condition: "state.status != 'DNC' && state.status != 'CONVERTED'"
    match:
      operationId: dncLead
      method: POST
      condition: "true"
      required_scopes:
        - manager
    emit: LeadMarkedDNC

reducers:
  - on: LeadMarkedDNC
    patches:
      - op: replace
        path: /status
        value: "${'DNC'}"

initialization: []
