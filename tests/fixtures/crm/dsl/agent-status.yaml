boundary: AgentStatus
contract_path: /agents/{id}/status
fallback_override: false

event_catalog:
  - type: AgentStatusChanged
    payload_template:
      newStatus: "command.payload.currentStatus"
      changedAt: "$now()"

behaviors:
  # emit_when with 2 branches based on new status
  - name: updateAgentStatus
    match:
      operationId: updateAgentStatus
      condition: "true"
    emit_when:
      - when: "command.payload.currentStatus == 'AVAILABLE' || command.payload.currentStatus == 'BREAK' || command.payload.currentStatus == 'OFFLINE'"
        emit: AgentStatusChanged
      - when: "command.payload.currentStatus == 'ON_CALL'"
        emit: AgentStatusChanged

reducers:
  - on: AgentStatusChanged
    patches:
      - op: replace
        path: /currentStatus
        value: "${event.payload.newStatus}"
      - op: replace
        path: /lastActiveAt
        value: "${event.payload.changedAt}"

initialization: []
