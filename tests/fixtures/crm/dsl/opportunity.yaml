boundary: Opportunity
contract_path: /opportunities
fallback_override: true
identity:
  creation:
    generate: $uuidv7()
query_mapping:
  stage: "state.stage == param"
  agentId: "state.agentId == param"
  campaignId: "state.campaignId == param"

event_catalog:
  - type: OpportunityCreated
    payload_template:
      id: "command.targetId"
      leadId: "command.payload.leadId"
      agentId: "coalesce(command.payload.agentId, null)"
      campaignId: "coalesce(command.payload.campaignId, null)"
      value: "command.payload.value"
      probability: "coalesce(command.payload.probability, 50)"
      expectedCloseDate: "coalesce(command.payload.expectedCloseDate, null)"

  - type: OpportunityAdvanced
    payload_template:
      newStage: "state.stage == 'PROPOSED' ? 'NEGOTIATING' : 'NEGOTIATING'"
      probability: "command.payload.probability"
      advancedAt: "$now()"

  # REQ-65: schema_ref on OpportunityWon event
  - type: OpportunityWon
    schema_ref: "#/components/schemas/OpportunityWon"
    payload_template:
      id: "command.targetId"
      leadId: "state.leadId"
      agentId: "state.agentId"
      campaignId: "state.campaignId"
      value: "state.value"
      closedAt: "$now()"

  - type: OpportunityLost
    payload_template:
      closureReason: "command.payload.closureReason"
      closedAt: "$now()"

behaviors:
  # Create opportunity (called via saga from lead conversion)
  - name: createOpportunity
    match:
      intent: creation
      condition: "true"
      requires:
        - name: positive-value
          condition: "command.payload.value > 0"
          error_code: INVALID_OPPORTUNITY_VALUE
          error_message: "Opportunity value must be greater than zero"
    emit: OpportunityCreated

  # Advance opportunity — REQ-61: requires not in terminal state
  - name: advanceOpportunity
    match:
      intent: mutation
      condition: "$concat('/opportunities/', command.targetId, '/advance') == command.path"
      requires:
        - name: not-closed
          condition: "state.stage != 'WON' && state.stage != 'LOST'"
          error_code: OPPORTUNITY_CLOSED
          error_message: "Cannot advance a closed opportunity"
        - name: not-negotiating
          condition: "state.stage != 'NEGOTIATING'"
          error_code: ALREADY_NEGOTIATING
          error_message: "Opportunity is already at NEGOTIATING stage"
    emit: OpportunityAdvanced

  # Close as WON — REQ-62: postcondition ensures value > 0 after winning
  - name: closeWon
    match:
      intent: mutation
      condition: "$concat('/opportunities/', command.targetId, '/close') == command.path && command.payload.outcome == 'WON'"
      requires:
        - name: must-be-negotiating
          condition: "state.stage == 'NEGOTIATING' || state.stage == 'PROPOSED'"
          error_code: CANNOT_WIN
          error_message: "Opportunity must be in PROPOSED or NEGOTIATING stage to be won"
    emit: OpportunityWon
    postcondition: "state.stage == 'WON' && state.value > 0"
    # REQ-63: conditional dispatch to agent metrics
    dispatch_commands:
      - boundary: Agent
        intent: mutation
        target_id: "state.agentId"
        payload:
          incrementConversions: "true"
        condition: "state.agentId != null"

  # Close as LOST — REQ-64: emit_when with alternative
  - name: closeLost
    match:
      intent: mutation
      condition: "$concat('/opportunities/', command.targetId, '/close') == command.path && command.payload.outcome == 'LOST'"
    emit_when:
      - when: "state.stage == 'NEGOTIATING'"
        emit: OpportunityLost
      - when: "state.stage == 'PROPOSED'"
        emit: OpportunityLost

reducers:
  - on: OpportunityCreated
    patches:
      - { op: replace, path: /id, value: "event.payload.id" }
      - { op: replace, path: /leadId, value: "event.payload.leadId" }
      - { op: replace, path: /agentId, value: "coalesce(event.payload.agentId, null)" }
      - { op: replace, path: /campaignId, value: "coalesce(event.payload.campaignId, null)" }
      - { op: replace, path: /stage, value: "'PROPOSED'" }
      - { op: replace, path: /value, value: "event.payload.value" }
      - { op: replace, path: /probability, value: "has(event.payload.probability) ? event.payload.probability : 50" }
      - { op: replace, path: /expectedCloseDate, value: "coalesce(event.payload.expectedCloseDate, null)" }

  - on: OpportunityAdvanced
    patches:
      - { op: replace, path: /stage, value: "'NEGOTIATING'" }
      - { op: replace, path: /probability, value: "event.payload.probability != null ? event.payload.probability : state.probability" }

  - on: OpportunityWon
    patches:
      - { op: replace, path: /stage, value: "'WON'" }
      - { op: replace, path: /closedAt, value: "event.payload.closedAt" }

  - on: OpportunityLost
    patches:
      - { op: replace, path: /stage, value: "'LOST'" }
      - { op: replace, path: /closedAt, value: "event.payload.closedAt" }
      - { op: replace, path: /closureReason, value: "event.payload.closureReason" }

initialization: []
