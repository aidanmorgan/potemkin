boundary: Lead
contract_path: /leads
fallback_override: true
# Auto-populate updatedAt/updatedBy on every non-baseline event for this boundary.
audit_fields: true
identity:
  creation:
    generate: $uuidv7()

# Boundary-level fault rules — scoped to this boundary, evaluated before behaviors.
# Simulate a slow external duplicate-check on lead creation. The checkDuplicates
# flag is not part of the OpenAPI POST /leads schema, so callers must send
# X-Potemkin-Skip-Request-Validation to reach this rule (see suite 30).
fault_rules:
  - name: duplicate-check-slow
    match:
      intent: creation
      condition: "command.payload.checkDuplicates == true"
    response:
      status: 504
      body:
        error: DUPLICATE_CHECK_TIMEOUT
        message: External duplicate-check service timed out
      delay_ms: 50
query_mapping:
  status: "state.status == param"
  campaignId: "state.assignedCampaignId == param"
  agentId: "state.assignedAgentId == param"

# Inline TypeScript script for lead scoring
scripts:
  - name: computeScore
    code: |
      export default function({ command, helpers }) {
        const source = command.payload.source;
        const baseScore = { REFERRAL: 80, PARTNER: 70, WEBSITE: 50, COLD_LIST: 20 };
        return baseScore[source] ?? 30;
      }

event_catalog:
  # schema_ref on LeadCreated event
  - type: LeadCreated
    schema_ref: "#/components/schemas/LeadCreated"
    payload_template:
      id: "command.targetId"
      companyName: "command.payload.companyName"
      contactName: "command.payload.contactName"
      phone: "command.payload.phone"
      email: "command.payload.email"
      source: "command.payload.source"
      status: "'NEW'"
      score: "ts:computeScore"
      createdAt: "$now()"
      callIds: "[]"
      notes: "[]"
      # Persist the agent/campaign a lead is created against (when supplied) so
      # the conversion saga can attribute the Opportunity it creates.
      assignedAgentId: "coalesce(command.payload.assignedAgentId, command.payload.agentId, null)"
      assignedCampaignId: "coalesce(command.payload.assignedCampaignId, command.payload.campaignId, null)"

  - type: LeadContacted
    payload_template:
      lastContactedAt: "$now()"

  - type: LeadQualified
    payload_template:
      qualifiedAt: "$now()"

  - type: LeadDisqualified
    payload_template:
      reason: "has(command.payload.reason) ? command.payload.reason : 'Not qualified'"

  - type: LeadConverted
    payload_template:
      convertedAt: "$now()"
      agentId: "state.assignedAgentId"
      campaignId: "state.assignedCampaignId"

  - type: LeadMarkedDNC
    payload_template:
      dncAt: "$now()"
      reason: "has(command.payload.reason) ? command.payload.reason : 'No reason given'"

  - type: CallIdAppended
    payload_template:
      callId: "command.payload.callId"

behaviors:
  # IMPORTANT: appendCallId is FIRST so it matches secondary dispatches from Call logging
  # before any other mutation behaviors are evaluated. First-match semantics
  # ensure subsequent behaviors with requires guards are never reached.
  - name: appendCallId
    match:
      operationId: patchLead
      condition: "has(command.payload.callId)"
    emit: CallIdAppended

  # Create lead with inline TS scoring
  - name: createLead
    match:
      operationId: createLead
      condition: "true"
    emit: LeadCreated
    # dispatch_commands with condition — assign to campaign only if one provided
    dispatch_commands:
      - boundary: Campaign
        intent: mutation
        operationId: getCampaign
        target_id: "command.payload.assignedCampaignId"
        payload:
          leadSource: "command.payload.source"
        condition: "command.payload?.assignedCampaignId != null"

  # Contact lead — match.requires with error_code/error_message
  # emit_when with 2+ alternatives
  - name: contactLead
    match:
      operationId: contactLead
      condition: "$concat('/leads/', command.targetId, '/contact') == command.path"
      requires:
        - name: not-dnc
          condition: "state.status != 'DNC'"
          error_code: LEAD_IS_DNC
          error_message: "Cannot contact a lead that has been marked Do Not Call"
        - name: not-converted
          condition: "state.status != 'CONVERTED'"
          error_code: LEAD_ALREADY_CONVERTED
          error_message: "Cannot contact a lead that has already been converted"
    emit_when:
      - when: "state.status == 'NEW' || state.status == 'CONTACTED'"
        emit: LeadContacted
      - when: "state.status == 'QUALIFIED'"
        emit: LeadContacted

  # Qualify lead — requires guard using CEL comprehension
  - name: qualifyLead
    match:
      operationId: qualifyLead
      condition: "$concat('/leads/', command.targetId, '/qualify') == command.path"
      requires:
        - name: must-be-contacted
          condition: "state.status == 'CONTACTED'"
          error_code: LEAD_NOT_CONTACTED
          error_message: "Lead must be in CONTACTED status to be qualified"
        - name: has-calls
          condition: "state.callIds.exists(c, true)"
          error_code: NO_CALLS_RECORDED
          error_message: "Lead must have at least one recorded call to be qualified"
    emit: LeadQualified

  # Disqualify lead
  - name: disqualifyLead
    match:
      operationId: disqualifyLead
      condition: "$concat('/leads/', command.targetId, '/disqualify') == command.path && (state.status == 'CONTACTED' || state.status == 'QUALIFIED')"
    emit: LeadDisqualified

  # Convert lead — postcondition
  - name: convertLead
    match:
      operationId: convertLead
      condition: "$concat('/leads/', command.targetId, '/convert') == command.path && state.status == 'QUALIFIED'"
    emit: LeadConverted
    postcondition: "state.status == 'CONVERTED'"

  # DNC — RBAC required_scopes
  - name: markLeadDNC
    match:
      operationId: dncLead
      condition: "$concat('/leads/', command.targetId, '/dnc') == command.path"
      required_scopes:
        - manager
    emit: LeadMarkedDNC

reducers:
  - on: LeadCreated
    patches:
      - op: replace
        path: /id
        value: "${event.payload.id}"
      - op: replace
        path: /companyName
        value: "${event.payload.companyName}"
      - op: replace
        path: /contactName
        value: "${event.payload.contactName}"
      - op: replace
        path: /phone
        value: "${event.payload.phone}"
      - op: replace
        path: /email
        value: "${event.payload.email}"
      - op: replace
        path: /source
        value: "${event.payload.source}"
      - op: replace
        path: /status
        value: "${'NEW'}"
      - op: replace
        path: /score
        value: "${event.payload.score}"
      - op: replace
        path: /createdAt
        value: "${event.payload.createdAt}"
      - op: replace
        path: /callIds
        value: "${[]}"
      - op: replace
        path: /notes
        value: "${[]}"
      - op: replace
        path: /assignedAgentId
        value: "${coalesce(event.payload.assignedAgentId, null)}"
      - op: replace
        path: /assignedCampaignId
        value: "${coalesce(event.payload.assignedCampaignId, null)}"

  - on: LeadContacted
    patches:
      - op: replace
        path: /status
        value: "${'CONTACTED'}"
      - op: replace
        path: /lastContactedAt
        value: "${event.payload.lastContactedAt}"

  - on: LeadQualified
    patches:
      - op: replace
        path: /status
        value: "${'QUALIFIED'}"

  - on: LeadDisqualified
    patches:
      - op: replace
        path: /status
        value: "${'DISQUALIFIED'}"

  - on: LeadConverted
    patches:
      - op: replace
        path: /status
        value: "${'CONVERTED'}"

  - on: LeadMarkedDNC
    patches:
      - op: replace
        path: /status
        value: "${'DNC'}"

  - on: CallIdAppended
    patches:
      - op: append
        path: /callIds
        value: "${event.payload.callId}"

