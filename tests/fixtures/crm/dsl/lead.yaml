boundary: Lead
contract_path: /leads
fallback_override: true
identity:
  creation:
    generate: $uuidv7()
query_mapping:
  status: "state.status == param"
  campaignId: "state.assignedCampaignId == param"
  agentId: "state.assignedAgentId == param"

# REQ-66: inline TypeScript script for lead scoring
scripts:
  - name: computeScore
    code: |
      export default function({ command, helpers }) {
        const source = command.payload.source;
        const baseScore = { REFERRAL: 80, PARTNER: 70, WEBSITE: 50, COLD_LIST: 20 };
        return baseScore[source] ?? 30;
      }

event_catalog:
  # REQ-65: schema_ref on LeadCreated event
  - type: LeadCreated
    schema_ref: "#/components/schemas/LeadCreated"
    payload_template:
      id: "command.targetId"
      companyName: "command.payload.companyName"
      contactName: "command.payload.contactName"
      phone: "command.payload.phone"
      email: "command.payload.email"
      source: "command.payload.source"
      status: "'NEW'"
      score: "ts:computeScore"
      createdAt: "$now()"
      callIds: "[]"
      notes: "[]"

  - type: LeadContacted
    payload_template:
      lastContactedAt: "$now()"

  - type: LeadQualified
    payload_template:
      qualifiedAt: "$now()"

  - type: LeadDisqualified
    payload_template:
      reason: "command.payload.reason != null ? command.payload.reason : 'Not qualified'"

  - type: LeadConverted
    payload_template:
      convertedAt: "$now()"

  - type: LeadMarkedDNC
    payload_template:
      dncAt: "$now()"
      reason: "command.payload.reason != null ? command.payload.reason : 'No reason given'"

  - type: CallIdAppended
    payload_template:
      callId: "command.payload.callId"

behaviors:
  # IMPORTANT: appendCallId is FIRST so it matches secondary dispatches from Call logging
  # before any other mutation behaviors are evaluated. First-match semantics (REQ-17)
  # ensure subsequent behaviors with requires guards are never reached.
  - name: appendCallId
    match:
      intent: mutation
      condition: "has(command.payload.callId) && command.payload.callId != null"
    emit: CallIdAppended

  # Create lead with inline TS scoring (REQ-66/67)
  - name: createLead
    match:
      intent: creation
      condition: "true"
    emit: LeadCreated
    # REQ-63: dispatch_commands with condition — assign to campaign only if one provided
    dispatch_commands:
      - boundary: Campaign
        intent: mutation
        target_id: "command.payload.assignedCampaignId"
        payload:
          leadSource: "command.payload.source"
        condition: "has(command.payload.assignedCampaignId) && command.payload.assignedCampaignId != null"

  # Contact lead — REQ-61: match.requires with error_code/error_message
  # REQ-64: emit_when with 2+ alternatives
  - name: contactLead
    match:
      intent: mutation
      condition: "$concat('/leads/', command.targetId, '/contact') == command.path"
      requires:
        - name: not-dnc
          condition: "state.status != 'DNC'"
          error_code: LEAD_IS_DNC
          error_message: "Cannot contact a lead that has been marked Do Not Call"
        - name: not-converted
          condition: "state.status != 'CONVERTED'"
          error_code: LEAD_ALREADY_CONVERTED
          error_message: "Cannot contact a lead that has already been converted"
    emit_when:
      - when: "state.status == 'NEW' || state.status == 'CONTACTED'"
        emit: LeadContacted
      - when: "state.status == 'QUALIFIED'"
        emit: LeadContacted

  # Qualify lead — REQ-61: requires guard using CEL comprehension
  - name: qualifyLead
    match:
      intent: mutation
      condition: "$concat('/leads/', command.targetId, '/qualify') == command.path"
      requires:
        - name: must-be-contacted
          condition: "state.status == 'CONTACTED'"
          error_code: LEAD_NOT_CONTACTED
          error_message: "Lead must be in CONTACTED status to be qualified"
        - name: has-calls
          condition: "state.callIds.exists(c, true)"
          error_code: NO_CALLS_RECORDED
          error_message: "Lead must have at least one recorded call to be qualified"
    emit: LeadQualified

  # Disqualify lead
  - name: disqualifyLead
    match:
      intent: mutation
      condition: "$concat('/leads/', command.targetId, '/disqualify') == command.path && (state.status == 'CONTACTED' || state.status == 'QUALIFIED')"
    emit: LeadDisqualified

  # Convert lead — REQ-62: postcondition
  - name: convertLead
    match:
      intent: mutation
      condition: "$concat('/leads/', command.targetId, '/convert') == command.path && state.status == 'QUALIFIED'"
    emit: LeadConverted
    postcondition: "state.status == 'CONVERTED'"

  # DNC — REQ-84/85/86: RBAC required_scopes
  - name: markLeadDNC
    match:
      intent: mutation
      condition: "$concat('/leads/', command.targetId, '/dnc') == command.path"
      required_scopes:
        - manager
    emit: LeadMarkedDNC

reducers:
  - on: LeadCreated
    assign:
      id: "event.payload.id"
      companyName: "event.payload.companyName"
      contactName: "event.payload.contactName"
      phone: "event.payload.phone"
      email: "event.payload.email"
      source: "event.payload.source"
      status: "'NEW'"
      score: "event.payload.score"
      createdAt: "event.payload.createdAt"
      callIds: "[]"
      notes: "[]"

  - on: LeadContacted
    assign:
      status: "'CONTACTED'"
      lastContactedAt: "event.payload.lastContactedAt"

  - on: LeadQualified
    assign:
      status: "'QUALIFIED'"

  - on: LeadDisqualified
    assign:
      status: "'DISQUALIFIED'"

  - on: LeadConverted
    assign:
      status: "'CONVERTED'"

  - on: LeadMarkedDNC
    assign:
      status: "'DNC'"

  - on: CallIdAppended
    append:
      callIds: "event.payload.callId"

