boundary: CallAddTranscript
contract_path: /calls/{id}/transcript
fallback_override: false

# Demonstrates request/response shape mismatch with nested graph:
#   Request:  { speaker: string, text: string }  (flat, 2 fields)
#   Graph:    transcript[]: { speaker, text, timestamp, sequenceNum }  (enriched with 2 computed fields)
#
# The DSL adds a timestamp and auto-incrementing sequence number to each entry.
# The graph accumulates transcript entries over multiple sequential requests.

event_catalog:
  - type: TranscriptEntryAppended
    payload_template:
      speaker: "command.payload.speaker"
      text: "command.payload.text"
      timestamp: "$now()"
      sequenceNum: "ts:computeSequenceNum"

behaviors:
  - name: addTranscriptEntry
    match:
      operationId: addTranscriptEntry
      condition: "true"
      requires:
        - name: has-speaker
          condition: "command.payload.speaker != null && command.payload.speaker != ''"
          error_code: SPEAKER_REQUIRED
          error_message: "Transcript entry must have a speaker"
        - name: has-text
          condition: "command.payload.text != null && command.payload.text != ''"
          error_code: TRANSCRIPT_TEXT_REQUIRED
          error_message: "Transcript entry must have text"
    emit: TranscriptEntryAppended

reducers:
  - on: TranscriptEntryAppended
    patches:
      # Append the whole event payload — a fully-formed transcript entry
      # ({ speaker, text, timestamp, sequenceNum }). Reducer patch values must be
      # a single CEL expression; an inline object literal with nested ${...}
      # would not be interpolated (non-string patch values pass through
      # unchanged).
      - op: append
        path: /transcript
        value: "${event.payload}"

initialization: []
