boundary: LeadConvert
contract_path: /leads/{id}/convert
fallback_override: false

event_catalog:
  - type: LeadConverted
    payload_template:
      convertedAt: "$now()"
      agentId: "state.assignedAgentId"
      campaignId: "state.assignedCampaignId"

behaviors:
  # REQ-62: postcondition
  - name: convertLead
    match:
      intent: mutation
      condition: "state.status == 'QUALIFIED'"
    emit: LeadConverted
    postcondition: "state.status == 'CONVERTED'"

reducers:
  - on: LeadConverted
    assign:
      status: "'CONVERTED'"

initialization: []
