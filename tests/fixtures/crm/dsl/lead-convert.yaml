boundary: LeadConvert
contract_path: /leads/{id}/convert
fallback_override: false
audit_fields: true

event_catalog:
  - type: LeadConverted
    payload_template:
      convertedAt: "$now()"
      agentId: "state.assignedAgentId"
      campaignId: "state.assignedCampaignId"

behaviors:
  # postcondition
  # HATEOAS: surfaced as the `convert` action link only while QUALIFIED.
  - name: convertLead
    link_name: convert
    link_condition: "state.status == 'QUALIFIED'"
    match:
      operationId: convertLead
      method: POST
      condition: "state.status == 'QUALIFIED'"
    emit: LeadConverted
    postcondition: "state.status == 'CONVERTED'"

reducers:
  - on: LeadConverted
    patches:
      - op: replace
        path: /status
        value: "${'CONVERTED'}"

initialization: []
