# The Nuisance Bureau CRM — JWT-flavoured global configuration
# Identical to ../crm/dsl/global.yaml except for the addition of the auth:
# block which switches the engine into JWT mode for the 41-jwt-auth e2e suite.
#
# The shared secret is hard-coded here for the test harness only — NEVER use this
# in production. Tests mint JWTs in-process using the same secret.

# JWT authentication
auth:
  mode: jwt
  jwt:
    secret: "potemkin-jwt-e2e-test-secret-do-not-use"
    algorithm: HS256
    issuer: "potemkin-test"
    audience: "potemkin-api"
    subject_claim: "sub"
    scopes_claim: "scopes"

# Idempotency config
idempotency:
  enabled: true
  ttl_seconds: 86400
  hash_includes_body: true

# HATEOAS — auto-generate _links on query responses
hateoas:
  enabled: true
  self_links: true

# HTTP security headers — applied to every response
security_headers:
  enabled: true
  hsts: true
  nosniff: true
  frame_deny: true
  referrer_policy: "strict-origin-when-cross-origin"
  custom_headers:
    X-Custom-Sim-Header: "potemkin-sim"

# Sagas with compensation
sagas:
  - name: LeadConversionSaga
    trigger:
      boundary: LeadConvert
      intent: mutation
      condition: "event.type == 'LeadConverted'"
    steps:
      - name: createOpportunity
        boundary: Opportunity
        intent: creation
        operationId: createOpportunity
        target_id: "${$uuidv7()}"
        payload:
          leadId: "${event.aggregateId}"
          agentId: "${event.payload.agentId}"
          campaignId: "${event.payload.campaignId}"
          value: "${command.payload.value}"
          probability: "${command.payload.probability}"
          expectedCloseDate: "${command.payload.expectedCloseDate}"
        compensation:
          intent: mutation
          operationId: closeOpportunity
          payload:
            revertStatus: "true"

# Webhook declarations — outbound HTTP POST on event emission
webhooks:
  - name: lead-converted-webhook
    trigger:
      boundary: LeadConvert
      intent: mutation
      condition: "event.type == 'LeadConverted'"
    url: "'http://127.0.0.1:19876/webhook'"
    secret: "webhook-test-secret-do-not-use-in-prod"
    payload:
      leadId: "${event.aggregateId}"
      event: "${event.type}"
    retry:
      maxAttempts: 3
      delayMs: 100

# Fault injection rules — DSL-driven chaos engineering.
fault_rules:
  - name: dnc-registry-slow
    match:
      boundary: LeadDNC
      intent: mutation
      condition: "command.payload.reason == 'REGISTRY_CHECK'"
    response:
      status: 504
      body:
        error: DNC_REGISTRY_TIMEOUT
        message: External DNC registry check timed out
      delay_ms: 100

  - name: rate-limit-via-header
    match:
      condition: "true"
      potemkin:
        rate_limit: "*"
    response:
      status: 429
      body:
        error: RATE_LIMITED
        message: Simulated rate limit (header-triggered)
        retryAfter: 30
      headers:
        Retry-After: "30"
        X-RateLimit-Limit: "100"
        X-RateLimit-Remaining: "0"

  - name: maintenance-mode-via-header
    match:
      condition: "true"
      potemkin:
        force_response: "maintenance"
    response:
      status: 503
      body:
        error: SERVICE_UNAVAILABLE
        message: Service in maintenance mode
      headers:
        Retry-After: "60"

  - name: lead-feature-flag-error
    match:
      boundary: Lead
      intent: query
      condition: "true"
      potemkin:
        feature_flag: "v2-experimental"
    response:
      status: 418
      body:
        error: TEAPOT
        message: Feature v2-experimental not available for this user

  - name: call-slow-db-scenario
    match:
      boundary: Call
      intent: creation
      condition: "true"
      headers:
        x-potemkin-scenario: "slow_db"
    response:
      status: 504
      body:
        error: GATEWAY_TIMEOUT
        message: Simulated slow database scenario
      headers:
        Retry-After: "5"

  # ── Chaos-header response overrides (suite 46) ────────────────────────────
  - name: force-status-599-backpressure
    match:
      condition: "true"
      headers:
        x-potemkin-force-status: "599"
    response:
      status: 599
      body:
        error: UPSTREAM_BACKPRESSURE
        hint: "Client should back off and retry with a smaller batch."
      headers:
        Retry-After: "15"

  - name: force-latency-750-accepted
    match:
      condition: "true"
      headers:
        x-potemkin-force-latency: "750"
    response:
      status: 202
      body:
        accepted: true
        delayed: true

  - name: error-class-throttle-custom
    match:
      condition: "true"
      headers:
        x-potemkin-error-class: "throttle"
    response:
      status: 429
      body:
        error: QUOTA_EXCEEDED
        quotaRemaining: 0
      headers:
        Retry-After: "45"

  - name: jitter-yaml-response
    match:
      condition: "true"
      headers:
        x-potemkin-jitter: "*"
    response:
      status: 200
      body:
        jittered: true

  - name: success-rate-failure-custom
    match:
      condition: "true"
      headers:
        x-potemkin-success-rate: "0"
    response:
      status: 503
      body:
        error: DEPENDENCY_DEGRADED
        message: Downstream dependency degraded — failing fast

# Derived projections aggregating across boundaries
derived_projections:
  - name: CampaignDashboard
    key: "event.payload.campaignId != null ? event.payload.campaignId : event.payload.assignedCampaignId"
    subscribe:
      - "Lead:LeadCreated"
      - "Lead:LeadConverted"
      - "Call:CallLogged"
      - "Opportunity:OpportunityWon"
    reduce:
      - on: "Lead:LeadCreated"
        patches:
          - op: replace
            path: /totalLeads
            value: "${state.totalLeads != null ? state.totalLeads + 1 : 1}"
          - op: replace
            path: /totalConversions
            value: "${state.totalConversions != null ? state.totalConversions : 0}"
      - on: "Lead:LeadConverted"
        patches:
          - op: replace
            path: /totalConversions
            value: "${state.totalConversions != null ? state.totalConversions + 1 : 1}"
      - on: "Call:CallLogged"
        patches:
          - op: replace
            path: /totalCalls
            value: "${state.totalCalls != null ? state.totalCalls + 1 : 1}"
      - on: "Opportunity:OpportunityWon"
        patches:
          - op: replace
            path: /wonCount
            value: "${state.wonCount != null ? state.wonCount + 1 : 1}"

  - name: AgentPerformance
    key: "event.payload.agentId != null ? event.payload.agentId : event.aggregateId"
    subscribe:
      - "Call:CallLogged"
      - "Agent:AgentConversionIncremented"
    reduce:
      - on: "Call:CallLogged"
        patches:
          - op: replace
            path: /callCount
            value: "${state.callCount != null ? state.callCount + 1 : 1}"
      - on: "Agent:AgentConversionIncremented"
        patches:
          - op: replace
            path: /conversionCount
            value: "${state.conversionCount != null ? state.conversionCount + 1 : 1}"
