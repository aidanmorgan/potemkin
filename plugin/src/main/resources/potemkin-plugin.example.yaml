# potemkin-plugin.example.yaml
#
# Copy this file to potemkin-plugin.yaml in the same directory from which you launch
# the Specmatic stub server, and edit to match your environment.
#
# Configuration is loaded in priority order:
#   1. File path given by the POTEMKIN_PLUGIN_CONFIG environment variable
#   2. ./potemkin-plugin.yaml  (this file's intended location)
#   3. ./potemkin-plugin.json
#   4. Built-in defaults (backendUrl: http://localhost:3000)
#
# NOTE: Routes are discovered at runtime — no static pathPatterns configuration is needed.
# On startup the plugin calls GET <backendUrl>/_engine/routes to fetch the list of paths
# owned by the Node engine. The route list is cached with a TTL (default 30 s) and
# refreshed in the background as it expires.

# URL of the Potemkin Node CQRS engine.
# The plugin will:
#   - GET  <backendUrl>/_engine/routes   to discover which paths to intercept
#   - POST <backendUrl>/_engine/forward  for each intercepted request
backendUrl: "http://localhost:3000"

# Timeout in milliseconds for forwarding calls to the Node engine.
# On timeout the plugin returns null and Specmatic falls through to its own stub matching.
forwardTimeoutMs: 5000

# Back-off interval in milliseconds before retrying the /_engine/routes discovery endpoint
# after a failed fetch. During the back-off period the stale (or empty) route list is kept.
discoveryRefreshOnFailureMs: 5000

# ---- Reliability layer ------------------------------------------------------------------

# TCP port for the Ktor control HTTP server. The Node engine sends POST /ready and
# POST /shutdown notifications to this server to signal lifecycle events.
# The plugin also exposes GET /health on this port for diagnostics.
controlPort: 9090

# Health probe interval when the engine is DOWN, in milliseconds.
# The adaptive monitor reduces the interval to this value when the engine is unreachable
# so that recovery is detected quickly.
healthProbeInitialMs: 250

# Health probe interval when the engine has been UP and stable for more than 5 minutes,
# in milliseconds. Reduces network chatter during normal operation.
healthProbeStableMs: 30000

# Total number of forward attempts (1 initial + N-1 retries) before the forwarder
# gives up and returns a 503 to the caller.
forwarderMaxRetries: 3

# Initial retry backoff in milliseconds. Retries use exponential backoff:
# 50 ms → 200 ms → 800 ms (multiplier 4.0, cap 800 ms).
forwarderBackoffMs: 50

# Failure rate percentage (0–100) that causes the circuit breaker to open.
# Once open, all forwarding calls immediately return 503 until the wait period expires.
circuitBreakerFailureRate: 50

# Time in milliseconds the circuit breaker stays open before attempting a half-open probe.
circuitBreakerWaitMs: 10000
